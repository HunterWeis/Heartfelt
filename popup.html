<!DOCTYPE html>
<!--
 This page is shown when the extension button is clicked, because the
 "browser_action" field in manifest.json contains the "default_popup" key with
 value "popup.html".
 -->
<html>
  <head>
      <link rel="stylesheet" type="text/css" href="http://fonts.googleapis.com/css?family=Abril Fatface">
      <link rel="stylesheet" type="text/css" href="http://fonts.googleapis.com/css?family=Josefin Slab">

    <script src="jquery-1.11.3.min.js"></script>
    <link rel="stylesheet" href="bootstrap/dist/css/bootstrap.css">

    

    <title>Heartfelt</title>

    <script>
    $(function() {
      $(".meters > span").each(function() {
        $(this)
          .data("origWidth", $(this).width())
          .width(0)
          .animate({
            width: $(this).data("origWidth")
          }, 1200);
      });
    });
    </script>

    <link rel="stylesheet" href="style.css">



    
  </head>
  <body>

    <center>

    <h2 id="headTitle">Heartfelt</h2>

      <hr>

      <p id='text'>Highlight some text!</p>


    



    <p id='score'></p>
    <p id='swear'></p>

    </center>

    <div class="meters animates" id="bars">
      <span style="width: 0%" id="barWidth"><span></span></span>
    </div>




    <script src="bootstrap/dist/js/bootstrap.min.js"></script>
    <script src="swearlist.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
